name: Build and Create Release

on:
  push:
    tags:
      - 'v*' # Trigger on version tags (e.g., v1.0.0)

jobs:
  release:
    name: Build & Publish Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant Execute Permission to Gradlew
        run: chmod +x gradlew

      - name: Build Release APK
        run: ./gradlew assembleRelease

      - name: Locate and Rename APK File
        id: find_apk
        run: |
          ORIG_APK=$(find app/build/outputs/apk/release/ -name "*.apk" | head -n 1)
          if [ -z "$ORIG_APK" ]; then
            echo "Error: No release APK found!"
            exit 1
          fi
          NEW_APK="app/build/outputs/apk/release/MorseTrainer-${{ github.ref_name }}.apk"
          mv "$ORIG_APK" "$NEW_APK"
          echo "Renamed APK to: $NEW_APK"
          echo "apk_path=$NEW_APK" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.find_apk.outputs.apk_path }}
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
